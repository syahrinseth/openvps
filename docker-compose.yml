services:
  # Traefik reverse proxy — routes all traffic by domain, handles SSL via Let's Encrypt
  # Replaces openvps-nginx + openvps-certbot. Ref: TRAEFIK_MIGRATION_PLAN.md Phase 1.3
  traefik:
    image: traefik:v3.6
    container_name: openvps-traefik
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./docker/traefik/traefik.yml:/etc/traefik/traefik.yml:ro
      - ./docker/traefik/dynamic:/etc/traefik/dynamic:ro
      - traefik-acme:/etc/traefik/acme
      - traefik-logs:/var/log/traefik
    environment:
      - ACME_EMAIL=${ACME_EMAIL}
      - DOCKER_API_VERSION=1.54
    networks:
      - traefik-public
      - openvps-network
    restart: unless-stopped
    # Dashboard labels intentionally omitted — enable by setting TRAEFIK_DASHBOARD_USERS
    # in .env and adding the router labels below, then `docker compose up -d traefik`

  # Nginx sidecar — handles FastCGI (PHP-FPM), WebSocket proxy, and static assets
  # No external ports; Traefik terminates TLS and proxies HTTP to this container
  panel-nginx:
    image: nginx:alpine
    container_name: openvps-panel-nginx
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
      - ./backend/public:/var/www/html/public
      - ./frontend/dist:/var/www/html/frontend
    depends_on:
      - backend
    networks:
      - traefik-public
      - openvps-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # Main panel route (HTTPS)
      - "traefik.http.routers.panel.rule=Host(`${PANEL_DOMAIN}`)"
      - "traefik.http.routers.panel.entrypoints=websecure"
      - "traefik.http.routers.panel.tls.certresolver=letsencrypt"
      - "traefik.http.routers.panel.middlewares=secure-headers@file,compress@file"
      - "traefik.http.services.panel.loadbalancer.server.port=80"

  # Laravel Backend (PHP-FPM)
  backend:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: openvps-backend
    volumes:
      - ./backend:/var/www/html
      - /var/run/docker.sock:/var/run/docker.sock
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - CACHE_STORE=redis
      - SESSION_DRIVER=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - openvps-network
    restart: unless-stopped

  # Queue Worker
  queue:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: openvps-queue
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - openvps-network
    restart: unless-stopped

  # Laravel Reverb WebSocket Server
  reverb:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: openvps-reverb
    command: php artisan reverb:start --host=0.0.0.0 --port=8080 --no-interaction
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
      - QUEUE_CONNECTION=redis
      - REVERB_APP_ID=${REVERB_APP_ID:-openvps-app}
      - REVERB_APP_KEY=${REVERB_APP_KEY:-openvps-key}
      - REVERB_APP_SECRET=${REVERB_APP_SECRET:-openvps-secret}
      - REVERB_HOST=0.0.0.0
      - REVERB_PORT=8080
      - REVERB_SCHEME=http
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - traefik-public
      - openvps-network
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      # WebSocket route — /app path used by Laravel Echo / Pusher.js
      - "traefik.http.routers.reverb.rule=Host(`${PANEL_DOMAIN}`) && PathPrefix(`/app`)"
      - "traefik.http.routers.reverb.entrypoints=websecure"
      - "traefik.http.routers.reverb.tls.certresolver=letsencrypt"
      - "traefik.http.routers.reverb.priority=10"
      - "traefik.http.services.reverb.loadbalancer.server.port=8080"

  # Laravel Scheduler
  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/backend/Dockerfile
    container_name: openvps-scheduler
    command: sh -c "while true; do php artisan schedule:run --verbose --no-interaction & sleep 60; done"
    volumes:
      - ./backend:/var/www/html
    env_file:
      - ./backend/.env
    environment:
      - DB_HOST=mysql
      - REDIS_HOST=redis
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - openvps-network
    restart: unless-stopped

  # MySQL 8.0
  mysql:
    image: mysql:8.0
    container_name: openvps-mysql
    ports:
      - "127.0.0.1:3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_ROOT_PASSWORD}
      - MYSQL_DATABASE=${DB_DATABASE:-openvps}
      - MYSQL_USER=${DB_USERNAME:-openvps}
      - MYSQL_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./docker/mysql/my.cnf:/etc/mysql/conf.d/custom.cnf
    networks:
      - openvps-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "${DB_USERNAME:-openvps}", "-p${DB_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:alpine
    container_name: openvps-redis
    command: redis-server --appendonly yes
    ports:
      - "127.0.0.1:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - openvps-network
    restart: unless-stopped

volumes:
  mysql-data:
  redis-data:
  traefik-acme:
  traefik-logs:

networks:
  # Internal network — MySQL, Redis, PHP-FPM, queue workers
  openvps-network:
    driver: bridge
  # Public network — Traefik + any container that should be publicly routed
  traefik-public:
    external: true
