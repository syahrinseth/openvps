# Nginx upstream config for the OpenVPS panel (openvps-panel-nginx container)
# Traefik handles TLS termination and HTTP→HTTPS redirect externally.
# This config is a pure upstream: FastCGI, WebSocket proxy, static assets.
# Ref: TRAEFIK_MIGRATION_PLAN.md — Phase 1.4

server {
    listen 80;
    server_name _;

    root /var/www/html/public;
    index index.php index.html;
    client_max_body_size 100M;

    # Backend API routes
    location /api {
        try_files $uri $uri/ @php;
    }

    location /sanctum {
        try_files $uri $uri/ @php;
    }

    location /broadcasting {
        try_files $uri $uri/ @php;
    }

    # Named location for PHP-FPM
    location @php {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param QUERY_STRING $query_string;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    # PHP-FPM processing
    location ~ \.php$ {
        fastcgi_pass backend:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_buffers 16 16k;
        fastcgi_buffer_size 32k;
        fastcgi_read_timeout 300;
    }

    # Static assets (served from frontend build)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        root /var/www/html/frontend;
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Frontend (React SPA) — must come after more specific locations
    location / {
        root /var/www/html/frontend;
        try_files $uri $uri/ /index.html;
    }

    # Deny hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
}
