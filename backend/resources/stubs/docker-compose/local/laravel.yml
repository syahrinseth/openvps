# Local deployment stub — Laravel (PHP-FPM + Nginx sidecar + MySQL)
# Ref: TRAEFIK_MIGRATION_PLAN.md — Phase 3.3
# Traefik routes {{DOMAIN}} → panel-nginx sidecar. No host port binding.
services:
  app:
    image: php:8.3-fpm-alpine
    container_name: {{APP_NAME}}-app
    working_dir: /var/www/html
    volumes:
      - .:/var/www/html
    environment:
      - APP_ENV=production
      - APP_KEY={{APP_KEY}}
    networks:
      - internal
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: {{APP_NAME}}-nginx
    volumes:
      - .:/var/www/html
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - internal
      - traefik-public
    restart: unless-stopped
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-public"
      - "traefik.http.routers.{{APP_NAME}}.rule=Host(`{{DOMAIN}}`)"
      - "traefik.http.routers.{{APP_NAME}}.entrypoints=websecure"
      - "traefik.http.routers.{{APP_NAME}}.tls.certresolver=letsencrypt"
      - "traefik.http.routers.{{APP_NAME}}.middlewares=secure-headers@file,rate-limit@file"
      - "traefik.http.services.{{APP_NAME}}.loadbalancer.server.port=80"

  mysql:
    image: mysql:8.0
    container_name: {{APP_NAME}}-mysql
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: {{APP_NAME}}
      MYSQL_USER: {{APP_NAME}}
      MYSQL_PASSWORD: secret
    volumes:
      - mysql-data:/var/lib/mysql
    networks:
      - internal
    restart: unless-stopped

networks:
  internal:
    driver: bridge
  traefik-public:
    external: true

volumes:
  mysql-data:
